<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PLK Interactive Map</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    :root { color-scheme: light dark; }
    html, body { height: 100%; margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
    body { background: #0b1220; color: #fff; }
    .topbar {
      position: fixed; left: 0; right: 0; top: 0;
      background: rgba(11,18,32,0.85);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.12);
      padding: 12px 16px;
      z-index: 9999;
      display: flex; align-items: center; gap: 12px;
    }
    .topbar a {
      color: #93c5fd; text-decoration: none; font-weight: 700;
    }
    .topbar .title { font-weight: 900; letter-spacing: 0.2px; }
    #map { height: 100vh; width: 100%; margin-top: 58px; }
    .leaflet-popup-content-wrapper { border-radius: 14px; }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="./index.html">← Back</a>
    <div class="title">PLK Interactive Map</div>
  </div>

  <div id="map" aria-label="PLK map"></div>

  <div class="plk-footer" aria-label="PLK footer">
    <span>PLK: <strong id="plk-coords">-23.910963, 29.450288</strong></span>
    <span style="opacity:.85;">•</span>
    <span style="opacity:.9;">Scroll/zoom on the map. Marker popup is available.</span>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
  <script>
    // Coordinates provided by user
    window.PLK_LAT = -23.9109630;
    window.PLK_LNG = 29.4502876;
  </script>
  <script src="./interactive.js"></script>
</body>
</html>
